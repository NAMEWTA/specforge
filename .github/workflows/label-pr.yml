name: PR Labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    name: Apply labels
    steps:
      - name: Apply PR labels
        uses: actions/labeler@v6
        with:
          configuration-path: .github/labeler.yml
